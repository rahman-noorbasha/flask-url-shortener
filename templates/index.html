<!DOCTYPE html>
<html>
<head>
    <title>Flask URL Shortener</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 100px;
        }

        input {
            width: 400px;
            padding: 10px;
        }

        button {
            padding: 10px 20px;
            margin-left: 10px;
        }

        a {
            color: blue;
        }
    </style>
</head>
<body>

    <h1>🔗 Flask URL Shortener</h1>

    <form method="POST">
        <input type="text" name="url" placeholder="Enter URL" required>
        <button type="submit">Shorten</button>
    </form>

    {% if short_url %}
        <h3>Your Short URL:</h3>
        <a href="{{ short_url }}">{{ short_url }}</a>
    {% endif %}

</body>
</html>
